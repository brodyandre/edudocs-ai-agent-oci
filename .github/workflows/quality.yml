name: Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  repository-quality:
    name: Repository quality
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.8"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml

      - name: Check UTF-8
        run: python3 scripts/check_utf8.py

      - name: Check whitespace
        run: |
          if git rev-parse HEAD^ >/dev/null 2>&1; then
            git diff --check HEAD^ HEAD
          else
            git diff-tree --check --root -r HEAD
          fi

      - name: Check repository hygiene
        run: python3 scripts/check_repository_hygiene.py

      - name: Install corpus validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "apps/api[dev]"

      - name: Validate corpus manifest and PDFs
        run: python3 scripts/validate_corpus.py

      - name: Validate Docker Compose syntax
        run: docker compose config

      - name: Validate Docker Compose policy
        run: |
          docker compose config --format json > "$RUNNER_TEMP/compose-config.json"
          python3 scripts/validate_compose_policy.py "$RUNNER_TEMP/compose-config.json" infrastructure/nginx/nginx.conf

      - name: Validate Terraform formatting
        run: terraform -chdir=infrastructure/terraform fmt -recursive -check

      - name: Initialize Terraform without backend
        run: terraform -chdir=infrastructure/terraform init -backend=false

      - name: Validate Terraform configuration
        run: terraform -chdir=infrastructure/terraform validate

      - name: Validate Terraform policy
        run: python3 scripts/check_terraform_policy.py

      - name: Test Terraform policy
        run: python -m pytest apps/api/tests/test_terraform_policy.py
