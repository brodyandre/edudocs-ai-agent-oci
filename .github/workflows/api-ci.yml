name: API CI

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/api-ci.yml"
      - "apps/api/**"
      - "corpus/**"
      - "scripts/check_utf8.py"
      - "scripts/check_repository_hygiene.py"
      - "scripts/check_terraform_policy.py"
      - "scripts/validate_corpus.py"
      - "scripts/validate_compose_policy.py"
      - "scripts/validate_npm_audit_policy.py"
      - "infrastructure/terraform/**"
      - "infrastructure/cloud-init/**"
      - "pyproject.toml"
      - "Makefile"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/api-ci.yml"
      - "apps/api/**"
      - "corpus/**"
      - "scripts/check_utf8.py"
      - "scripts/check_repository_hygiene.py"
      - "scripts/check_terraform_policy.py"
      - "scripts/validate_corpus.py"
      - "scripts/validate_compose_policy.py"
      - "scripts/validate_npm_audit_policy.py"
      - "infrastructure/terraform/**"
      - "infrastructure/cloud-init/**"
      - "pyproject.toml"
      - "Makefile"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  EDUDOCS_LLM_PROVIDER: fake
  EDUDOCS_EMBEDDING_PROVIDER: fake

jobs:
  api:
    name: API quality and RAG evaluation
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: apps/api/pyproject.toml

      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "apps/api[dev]"

      - name: Validate corpus
        run: python3 scripts/validate_corpus.py

      - name: Build deterministic index
        working-directory: apps/api
        run: python -m app.ingestion.cli build

      - name: Validate deterministic index
        working-directory: apps/api
        run: python -m app.ingestion.cli validate

      - name: Ruff
        run: ruff check apps/api

      - name: Pytest
        run: pytest apps/api/tests

      - name: Strict RAG evaluation
        working-directory: apps/api
        run: |
          python -m app.evaluation.cli run --strict \
            --output-json "$RUNNER_TEMP/edudocs-evaluation.json" \
            --output-markdown "$RUNNER_TEMP/edudocs-evaluation.md"
